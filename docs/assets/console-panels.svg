<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#08131C"/>
  <rect x="70" y="70" width="1460" height="840" rx="32" fill="#0F2330" stroke="#33596B"/>
