  <text x="1333" y="681" fill="#F4F7FA" font-family="'Trebuchet MS', sans-serif" font-size="22" font-weight="700">uninstall</text>
  <text x="840" y="754" fill="#B7CAD5" font-family="'Trebuchet MS', sans-serif" font-size="18">
